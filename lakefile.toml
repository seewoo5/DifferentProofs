name = "different-proofs"
version = "0.1.0"
defaultTargets = ["DifferentProofs"]

[leanOptions]
pp.unicode.fun = true
autoImplicit = false
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
weak.linter.flexible = false
linter.style.header = false
experimental.module = true

[[require]]
name = "checkdecls"
git = "https://github.com/PatrickMassot/checkdecls.git"

# Pin verso to the reachable v4.30.0 tag. VersoBlueprint v4.30.0 transitively
# pins verso to an orphaned commit (not on any branch/tag), which a normal
# `git fetch` cannot retrieve, breaking fresh checkouts. This direct require
# overrides that inherited pin with the equivalent tagged release.
[[require]]
name = "verso"
git = "https://github.com/leanprover/verso"
rev = "v4.30.0"

[[require]]
name = "VersoBlueprint"
git = "https://github.com/leanprover/verso-blueprint"
rev = "v4.30.0"

# Override VersoBlueprint's inherited verso pin: it points at a bare SHA on a
# branch that verso force-pushed/GC'd, so lake can no longer fetch it. The
# stable v4.30.0 tag is identical in src/verso to that orphaned commit.
[[require]]
name = "verso"
git = "https://github.com/leanprover/verso"
rev = "v4.30.0"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0"

[[lean_lib]]
name = "DifferentProofs"

[[lean_lib]]
name = "DifferentProofsBlueprint"
